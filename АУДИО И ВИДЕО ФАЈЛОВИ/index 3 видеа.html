<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  font-size: 17px;
}

#myVideo {
  position: fixed;
  
  min-width: 450px; 
  min-height: 250px;
  margin-top: 20px;
   z-index: -2;
   opacity: 0.8;
}
#myVideo2 {
  position: fixed;
  
  min-width: 450px; 
  min-height: 250px;
  margin-top: 20px;
   z-index: -2;
   opacity: 0.8;
}
#myVideo3 {
  position: fixed;
  
  min-width: 450px; 
  min-height: 250px;
  margin-top: 20px;
   z-index: -2;
   opacity: 0.8;
}

.content {
  position: fixed;
  /* bottom: 0; */
  background: rgba(0, 0, 0, 0.5);
  color: #f1f1f1;
  width: 100%;
  padding: 20px;
  margin-top: 300px;
}


#myBtn {
  width: 200px;
  font-size: 18px;
  padding: 10px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
 opacity: 0.8;
}
#myBtn2 {
  width: 200px;
  font-size: 18px;
  padding: 10px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
 opacity: 0.8;
}
#myBtn3 {
  width: 200px;
  font-size: 18px;
  padding: 10px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
 opacity: 0.8;
}

#myBtn:hover {
  background: #ddd;
  color: black;
}
#myBtn2:hover {
  background: #ddd;
  color: black;
}
#myBtn3:hover {
  background: #ddd;
  color: black;
}

</style>
</head>
<body>

<video autoplay muted loop id="myVideo" controls style="margin-left: 15px;border: solid 2px pink;">
  <source src="video.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>
<video autoplay muted loop id="myVideo2" controls style="margin-left: 540px;border: solid 2px pink;">
  <source src="video.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>
<video autoplay muted loop id="myVideo3" controls style="margin-left: 1070px;border: solid 2px pink;">
  <source src="video.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>


    <button id="myBtn" onclick="myFunction()" style="margin-top: 260px;margin-left: 110px;">Pause</button>
    <button id="myBtn2" onclick="myFunction2()" style="margin-top: 260px;margin-left: 370px;">Pause</button>
    <button id="myBtn3" onclick="myFunction3()" style="margin-top: 260px;margin-left: 310px;">Pause</button>


<script>
var video = document.getElementById("myVideo");
var btn = document.getElementById("myBtn");

function myFunction() {
  if (video.paused) {
    video.play();
    btn.innerHTML = "Pause";
    window.open("video.mp4","_blank");
  } else {
    video.pause();
    btn.innerHTML = "Play";
    
  }
}
var video2 = document.getElementById("myVideo2");
var btn2 = document.getElementById("myBtn2");

function myFunction2() {
  if (video2.paused) {
    video2.play();
    btn2.innerHTML = "Pause";
  } else {
    video2.pause();
    btn2.innerHTML = "Play";
  }
}

var video3 = document.getElementById("myVideo3");
var btn3 = document.getElementById("myBtn3");

function myFunction3() {
  if (video3.paused) {
    video3.play();
    btn3.innerHTML = "Pause";
  } else {
    video3.pause();
    btn3.innerHTML = "Play";
  }
}
</script>

</body>
</html>
