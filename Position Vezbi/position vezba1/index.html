<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    
<style>
p { color: white; margin: 0; padding:0; }
.box1 {  
  background-color: #8bc34a;
  width: 80px;
  height: 80px;
}
.box2 { 
  position: absolute;
  right: 200px;
  bottom: 200px;
  width: 300px;
  height:300px;
  background-color: #ff5722; 
}
.box3 { 
  background-color: #9e9e9e;
  width: 150px;
  height: 150px;
  position: absolute;
  bottom: 30px;
  right: 30px;
}
.box4 {  
  background-color: #00bcd4;
  width: 80px;
  height: 80px;
}
</style>
</head>
<body>
    <div class="box1">
        <p>Box 1</p>
      </div>
      <div class="box2">
        <p>Box 2 <br>position: absolute;<br>
        right: 200px;<br>
          bottom: 200px;
        </p>
        <div class="box3">
          <p>Box 3 <br>position: absolute;<br>
        bottom: 30px;<br>
        right: 30px;</p>
        </div>
      </div>
      <div class="box4">
        <p>Box 4</p>
      </div>
    
</body>
</html>
